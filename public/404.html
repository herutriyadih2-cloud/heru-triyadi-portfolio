<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Heru Triyadi</title>
    <script>
      // Fallback SPA untuk GitHub Pages: alihkan path ke index.html lewat query,
      // lalu dipulihkan oleh skrip di index.html. (teknik rafgraph/spa-github-pages)
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
