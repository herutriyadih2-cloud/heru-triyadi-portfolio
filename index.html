    <!-- Pemulih rute SPA untuk GitHub Pages (pasangan dari public/404.html) -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>

    <title>Heru Triyadi | Frontend Developer & UI/UX Designer</title>
    <meta
